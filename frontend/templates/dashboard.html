<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoodMatch — Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
  <nav class="nav">
    <div class="nav-logo"><span class="logo-icon">🎵</span><span class="logo-text">MoodMatch</span></div>
    <div class="nav-links">
      <a href="/" class="nav-link">Upload</a>
      <a href="/history" class="nav-link">History</a>
      <a href="/dashboard" class="nav-link active">Analytics</a>
    </div>
  </nav>
  <main class="main">
    <section class="hero" style="margin-bottom:2rem">
      <h1 class="hero-title" style="font-size:2.5rem">Global <span class="gradient-text">Analytics</span></h1>
    </section>
    <div class="dashboard-grid">
      <div class="stat-card"><div class="stat-num" id="totalSessions">—</div><div class="stat-label">Total Analyses</div></div>
      <div class="stat-card"><div class="stat-num" id="topEmotion">—</div><div class="stat-label">Most Common Mood</div></div>
    </div>
    <div class="chart-card">
      <h3 class="section-title">Emotion Distribution</h3>
      <canvas id="emotionDist" height="300"></canvas>
    </div>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script src="/static/js/dashboard.js"></script>
</body>
</html>
